services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tcf
      POSTGRES_USER: tcf
      POSTGRES_PASSWORD: tcf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcf"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://tcf:tcf@postgres:5432/tcf
      SOURCE_ROOT: /app/Sources
      GENERATED_ROOT: /app/content/generated
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./Sources:/app/Sources:ro
      - ./content/generated:/app/content/generated
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:

